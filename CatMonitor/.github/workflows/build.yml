name: Build Cat Monitor APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Permite ejecutarlo manualmente desde GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Descargar código
        uses: actions/checkout@v4

      - name: ☕ Configurar Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: 🤖 Configurar Android SDK
        uses: android-actions/setup-android@v3

      - name: 📥 Descargar Gradle Wrapper JAR
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://github.com/gradle/gradle/raw/v8.2.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      - name: 🔑 Dar permisos a Gradle
        run: chmod +x gradlew

      - name: 🔨 Compilar APK (debug)
        run: ./gradlew assembleDebug --no-daemon

      - name: 📦 Subir APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: CatMonitor-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
